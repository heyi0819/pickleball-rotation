<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匹克球場地輪轉模擬器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #2c3e50; }
        .controls {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
            margin-bottom: 20px;
        }
        .mode-select { margin-bottom: 15px; font-weight: bold; }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        button.reset { background-color: #e74c3c; }
        button.reset:hover { background-color: #c0392b; }
        .round-display {
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 20px;
        }
        
        /* 場地排版 */
        .court-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .court {
            width: 140px;
            height: 200px;
            background-color: #27ae60; /* 球場綠色 */
            border: 3px solid #ecf0f1;
            border-radius: 8px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .net {
            height: 4px;
            background-color: white;
            width: 100%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }
        .court-name {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #34495e;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 10;
            white-space: nowrap;
        }
        .team-slot {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            z-index: 2;
        }
        .team-fixed { background-color: rgba(255, 255, 255, 0.85); color: #2c3e50; border-radius: 5px 5px 0 0; }
        .team-rotating { background-color: rgba(241, 196, 15, 0.95); color: #c0392b; border-radius: 0 0 5px 5px; transition: all 0.3s ease; }
    </style>
</head>
<body>

    <h1>🏸 匹克球場地輪轉模擬器</h1>

    <div class="controls">
        <div class="mode-select">
            <label><input type="radio" name="mode" value="8" checked> 8場地大循環 (1~8跨場移動)</label>
            &nbsp;&nbsp;&nbsp;
            <label><input type="radio" name="mode" value="4"> 4場地分組循環 (1~4一組, 5~8一組)</label>
        </div>
        <button onclick="shift('left')">⬅️ 下一輪：移動方【向左移】</button>
        <button onclick="shift('right')">➡️ 下一輪：移動方【向右移】</button>
        <button class="reset" onclick="reset()">🔄 重新開始</button>
    </div>

    <div class="round-display">目前輪數：第 <span id="roundCount">1</span> 輪</div>

    <div class="court-row" id="row1"></div>
    
    <div class="court-row" id="row2"></div>

    <script>
        let round = 1;
        // 初始狀態：固定方 (1~8)
        const fixedTeams = [1, 2, 3, 4, 5, 6, 7, 8];
        // 初始狀態：移動方 (9~16)
        let rotatingTeams = [9, 10, 11, 12, 13, 14, 15, 16];

        function renderCourts() {
            document.getElementById('roundCount').innerText = round;
            
            const row1 = document.getElementById('row1');
            const row2 = document.getElementById('row2');
            row1.innerHTML = '';
            row2.innerHTML = '';

            for (let i = 0; i < 8; i++) {
                const courtDiv = document.createElement('div');
                courtDiv.className = 'court';
                courtDiv.innerHTML = `
                    <div class="court-name">第 ${i + 1} 場地</div>
                    <div class="team-slot team-fixed">隊 ${fixedTeams[i]}</div>
                    <div class="net"></div>
                    <div class="team-slot team-rotating">隊 ${rotatingTeams[i]}</div>
                `;
                
                if (i < 4) {
                    row1.appendChild(courtDiv);
                } else {
                    row2.appendChild(courtDiv);
                }
            }
        }

        function shift(direction) {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            let newTeams = new Array(8);

            if (mode === "8") {
                // 8場地大循環
                for (let i = 0; i < 8; i++) {
                    if (direction === 'left') {
                        newTeams[i] = rotatingTeams[(i + 1) % 8];
                    } else {
                        newTeams[i] = rotatingTeams[(i - 1 + 8) % 8];
                    }
                }
            } else {
                // 4場地分組循環 (1~4一組, 5~8一組)
                for (let i = 0; i < 4; i++) {
                    if (direction === 'left') {
                        newTeams[i] = rotatingTeams[(i + 1) % 4];
                        newTeams[i + 4] = rotatingTeams[4 + ((i + 1) % 4)];
                    } else {
                        newTeams[i] = rotatingTeams[(i - 1 + 4) % 4];
                        newTeams[i + 4] = rotatingTeams[4 + ((i - 1 + 4) % 4)];
                    }
                }
            }

            rotatingTeams = newTeams;
            round++;
            renderCourts();
        }

        function reset() {
            round = 1;
            rotatingTeams = [9, 10, 11, 12, 13, 14, 15, 16];
            renderCourts();
        }

        // 初始化畫面
        renderCourts();
    </script>
</body>
</html>
